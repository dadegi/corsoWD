    <h1>FORMS</h1>

    <hr />

    <h2>Form semplice</h2>

    <form method="GET" action="thanks.html">

        <label for="userName">Nome e cognome</label>
        <input type="text" id="userName" name="userName" />
        <label for="email">Email</label>
        <input type="email" id="email" name="email" />
        <button type="submit" id="send">INVIA</button>

    </form>

    <hr />

    <h2>Form complesso</h2>

    <form method="GET" action="thanks.html">

        <h3>Form di registrazione</h3>

        <fieldset>
            <legend>ANAGRAFICA</legend>
            <label for="nameUser">NOME</label>
            <input type="text" id="nameUser" name="nameUser" placeholder="Inserisci il tuo nome" />
            <label for="surnameUser">COGNOME*</label>
            <input type="text" id="surnameUser" name="surnameUser" placeholder="Inserisci il tuo cognome" required />
            <label for="birthDate">DATA DI NASCITA</label>
            <input type="date" id="birthDate" name="birthDate" />
            <br /><br />
            <label for="userAddress">INDIRIZZO COMPLETO</label>
            <textarea id="userAddress" name="userAddress" cols="80"></textarea>
            <br /><br />
            <label for="userEmail">EMAIL*</label>
            <input type="email" id="userEmail" name="userEmail"
                placeholder="Inserisci una email valida: name@example.com" required />
            <label for="userPass">PASSWORD*</label>
            <input type="password" id="userPass" name="userPass"
                placeholder="Inserisci una password tra 8 e 15 caratteri" minlength="8" maxlength="15" required />
        </fieldset>
        <br />
        <fieldset>
            <legend>PREFERENZE</legend>
            <label for="courseType">TIPO DI CORSO*</label>
            <select id="courseType" name="courseType" required>
                <option value="" selected></option>
                <option value="FT">Full Time</option>
                <option value="PT">Part Time</option>
                <option value="serale">Serale</option>
            </select>
            <br /><br />
            <label for="materie">MATERIA DEL CORSO* (scegliere la materia di interesse)</label><br />
            <input type="radio" id="develop" name="materie" value="development" />
            <label for="develop">DEVELOPMENT</label><br />
            <input type="radio" id="design" name="materie" value="webDesign" />
            <label for="design">WEB DESIGN</label><br />
            <input type="radio" id="content" name="materie" value="contentMan" />
            <label for="content">CONTENT MANAGEMENT</label>
            <br /><br />
            <label>STRUMENTI CONOSCIUTI</label><br />
            <input type="checkbox" id="vscode" name="vscode" />
            <label for="vscode">Visual Studio Code</label><br />
            <input type="checkbox" id="browsing" name="browsing" />
            <label for="browsing">Browser</label><br />
            <input type="checkbox" id="devTools" name="devTools" />
            <label for="devTools">Developer tools</label><br />
            <input type="checkbox" id="graphic" name="graphic" />
            <label for="graphic">Strumenti grafici</label>
        </fieldset>
        <br />

        <button type="submit" id="sendForm" name="sendForm">INVIA</button>
        <button type="reset" id="clearForm" name="clearForm">CANCELLA</button>
        <br />
        <h4>*Campi obbligatori</h4>

    </form>

    <hr />
